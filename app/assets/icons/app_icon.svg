<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: dark premium -->
  <rect width="1024" height="1024" rx="180" fill="#0D0D0F"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B7EFD"/>
      <stop offset="50%" stop-color="#7C5CFC"/>
      <stop offset="100%" stop-color="#5B3FD4"/>
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4DFFC0"/>
      <stop offset="100%" stop-color="#00E5A0"/>
    </linearGradient>
  </defs>
  
  <!-- Main leaf shape - stylized "N" leaf -->
  <g transform="translate(512, 512)">
    <!-- Outer leaf glow -->
    <ellipse cx="0" cy="0" rx="320" ry="280" fill="url(#leafGradient)" opacity="0.15"/>
    
    <!-- Main leaf body -->
    <path d="M -200,-180 
             C -200,-280 -100,-340 0,-340
             C 100,-340 200,-280 200,-180
             L 200,180
             C 200,280 100,340 0,340
             C -100,340 -200,280 -200,180
             Z" 
          fill="url(#leafGradient)"/>
    
    <!-- Inner leaf vein (Nuveli "N" stylized) -->
    <path d="M -120,-180 
             L -120,180 
             L 120,-180 
             L 120,180" 
          stroke="#FFFFFF" 
          stroke-width="40" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"
          opacity="0.95"/>
    
    <!-- Accent dot - mindfulness symbol -->
    <circle cx="160" cy="-220" r="40" fill="url(#accentGradient)"/>
  </g>
</svg>
