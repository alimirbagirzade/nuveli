name: nuveli
description: Nuveli - AI Calorie Coach

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Routing
  go_router: ^13.2.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  # Network
  dio: ^5.4.3
  retrofit: ^4.1.0

  # Supabase
  supabase_flutter: ^2.5.0

  # RevenueCat
  purchases_flutter: ^7.4.0

  # Firebase
  firebase_core: ^2.30.0
  firebase_analytics: ^10.10.0
  firebase_crashlytics: ^3.5.0
  firebase_messaging: ^14.9.0

  # Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # UI
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Image
  image_picker: ^1.0.7
  camera: ^0.10.5+9

  # Audio
  just_audio: ^0.9.38

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  logger: ^2.3.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.3.9
  retrofit_generator: ^8.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
