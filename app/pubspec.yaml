name: nuveli
description: Nuveli - AI Calorie Coach

publish_to: 'none'
version: 0.13.0+29

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Routing
  go_router: ^13.2.0

  # State management
  flutter_riverpod: ^2.5.1

  # Network
  dio: ^5.4.3

  # Supabase
  supabase_flutter: ^2.5.0

  # RevenueCat
  purchases_flutter: ^8.11.0

  # Firebase (3.x+ uses Firebase iOS SDK 11.x with fixed modular headers — required for Xcode 16)
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.1.0
  firebase_messaging: ^15.1.0
  # Note: Firebase iOS SDK 11.x requires iOS 15+ deployment target.
  # Podfile is set to platform :ios, '15.0' for compatibility.
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.5

  # UI
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Image
  image_picker: ^1.0.7
  camera: ^0.10.5+9

  # Audio
  just_audio: ^0.9.38

  # Utils
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  logger: ^2.3.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter
  # App icon & splash generation
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.0

# Flutter Launcher Icons config
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0D0D0F"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

# Flutter Native Splash config
flutter_native_splash:
  color: "#0D0D0F"
  image: "assets/icons/splash_logo.png"
  android_12:
    color: "#0D0D0F"
    image: "assets/icons/splash_logo.png"
  ios: true
  android: true
  web: false

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
  # Note: Inter fonts and other asset folders removed temporarily.
  # When ready, add Inter-*.ttf files to assets/fonts/ and uncomment below.
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
