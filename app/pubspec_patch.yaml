# ============================================================================
# Chat 15 — pubspec.yaml'a eklenecek bağımlılıklar
# ============================================================================
# Bu dosyayı OLDUĞU GİBİ kopyalama. Mevcut pubspec.yaml'ındaki "dependencies:"
# bloğuna AŞAĞIDAKİ satırları ekle (varsa version'ı güncelle), sonra:
#
#   flutter pub get
#
# ============================================================================

dependencies:
  # ---- Auth & Backend ----
  supabase_flutter: ^2.3.0      # Supabase Auth + DB client
  sign_in_with_apple: ^5.0.0    # Apple Sign-In (iOS)
  crypto: ^3.0.3                # Apple nonce SHA256 hash için

  # ---- Networking ----
  dio: ^5.4.0                   # Backend (Render) HTTP client

  # ---- Configuration ----
  flutter_dotenv: ^5.1.0        # .env dosyası okuma

  # ---- State (Chat 1'de varsa atla) ----
  flutter_riverpod: ^2.4.0

  # ---- Persistence (onboarding ortasında app kapanırsa kaldığı yerden devam) ----
  shared_preferences: ^2.2.2

# ============================================================================
# .env dosyalarını assets olarak ekle (flutter section'a):
# ============================================================================
flutter:
  assets:
    - .env
    # - .env.development
    # - .env.production
